# Zee Scanner Configuration
# Quick preset: Fast scan (skip slow tools)

# Disable slow tools
ENABLE_AMASS=false
ENABLE_GOSPIDER=false
# ENABLE_KATANA=false

# Keep everything else enabled
ENABLE_SUBFINDER=true
ENABLE_ASSETFINDER=true
ENABLE_FINDOMAIN=true
ENABLE_CRTSH=true

# Feature toggles
ENABLE_TAKEOVER=true
ENABLE_SCREENSHOTS=true

# Performance settings
MAX_JS_FILES=300
MAX_PARALLEL_JS=15
